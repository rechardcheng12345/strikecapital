version: '3.8'

services:
  db:
    image: mysql:8.4
    container_name: strikecapital-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: strikecapital
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
